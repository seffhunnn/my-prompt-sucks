name: Release Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Package & Upload Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          cd extension
          zip -r "../my-prompt-sucks-${{ steps.version.outputs.VERSION }}.zip" . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          echo "Packaged extension as my-prompt-sucks-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-prompt-sucks-${{ steps.version.outputs.VERSION }}.zip
